    <path d="M220,346 H293"/>
    <path d="M220,386 H293"/>
    <path d="M547,210 H640"/>
    <path d="M547,320 H640"/>
    <path d="M547,415 H640"/>
    <path d="M547,510 H640"/>
    <path d="M547,616 H640"/>
    <path d="M420,630 V672"/>
