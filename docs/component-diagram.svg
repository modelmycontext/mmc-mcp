<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="760" viewBox="0 0 1060 760" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <symbol id="cmp" viewBox="0 0 26 22">
      <rect x="7" y="3" width="17" height="16" fill="none" stroke="currentColor" stroke-width="1.7"/>
